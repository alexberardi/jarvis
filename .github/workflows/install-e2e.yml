name: install-e2e

# Stands up the EXACT artifact the installer ships (generated compose-export),
# on a clean ubuntu-latest, and asserts the whole install actually works —
# instead of finding out by hand on someone's machine.
#
# Phase 1 (now): generate -> validate -> up -> assert health + admin configured
#                + ports/volumes/networking. Catches the class of bugs that hit
#                the Bazzite box (undefined volume, missing admin port, curl
#                healthcheck on a Node image, admin can't reach auth).
# Phase 2 (next): CC routes a voice-command corpus through the real ChatGPTOpenAI
#                provider -> cloud model (needs OPENAI_API_KEY).
# Phase 3 (next): real jarvis-node container joins Mosquitto + completes K2.
#
# Not on pull_request (needs the OpenAI secret for Phase 2; public-repo hygiene).

on:
  workflow_dispatch:
    inputs:
      modules:
        description: "Recommended/optional modules to enable (comma-separated)"
        default: "jarvis-whisper-api,jarvis-tts,jarvis-notifications,jarvis-web,jarvis-admin"
      sync_live:
        description: "Also run the heavy live SYNC-compose bring-up lane (sync-live job)"
        type: boolean
        default: false
  schedule:
    - cron: "37 6 * * *" # nightly, after the llm-proxy behavior lane
  pull_request:
    paths:
      - "install-e2e/**"
      - ".github/workflows/install-e2e.yml"
  # Fired by each service repo's trigger-install-e2e.yml on push to main, so a
  # service commit that breaks the install is caught immediately (not just
  # nightly). The payload carries the originating service + sha; dispatched runs
  # use the `dev` release track so they test that service's freshly-built :dev
  # image, not the old :latest.
  repository_dispatch:
    types: [service-commit]

permissions:
  contents: read
  packages: read

concurrency:
  group: install-e2e
  cancel-in-progress: true

env:
  STORAGE_PATH: /var/lib/jarvis
  # P0.4 (installer#18) locks the broker on fresh installs; the harness's
  # jarvis-node:latest predates broker creds, so CI uses the documented
  # adoption knob. Drop this once the node ships MQTT creds support and
  # seed.py provisions them (tracked with the node-release ordering in
  # jarvis#6).
  MQTT_ALLOW_ANON: "true"
  COMPOSE_PROJECT: jarvis
  GEN_FILE: install-e2e/docker-compose.gen.yaml
  OVERRIDE_FILE: install-e2e/docker-compose.ci-override.yaml
  NODE_FILE: install-e2e/docker-compose.node.yaml
  # Admin SYNC / reconcile compose — the OTHER generator (where the 2026-06
  # fleet-outage bug actually lived). Generated by gen-sync-compose.mts.
  SYNC_FILE: install-e2e/docker-compose.sync.yaml

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout umbrella (harness)
        uses: actions/checkout@v4

      - name: Checkout jarvis-installer (generator)
        uses: actions/checkout@v4
        with:
          repository: alexberardi/jarvis-installer
          path: jarvis-installer

      - name: Checkout jarvis-admin (SYNC / reconcile generator)
        # The OTHER compose generator — the admin reconcile path is where the
        # 2026-06 fleet-outage bug lived. We regenerate its compose and assert
        # the migrate entrypoints (sync-path lane) without it ever reaching prod.
        uses: actions/checkout@v4
        with:
          repository: alexberardi/jarvis-admin
          path: jarvis-admin

      - name: Free up disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "${AGENT_TOOLSDIRECTORY:-}" || true
          docker system prune -af || true
          df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: jarvis-installer/package-lock.json

      - name: Generate the real install artifact (compose-export)
        working-directory: jarvis-installer
        run: |
          npm ci
          # A service-commit dispatch just published that service's :dev image —
          # test the dev track so we validate the NEW code, not the old :latest.
          REL=stable
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REL=dev
            echo "::notice::install-e2e triggered by ${{ github.event.client_payload.service || 'unknown' }}@${{ github.event.client_payload.sha || '?' }} → dev track"
          fi
          npx tsx scripts/gen-export-compose.mts \
            --out "$GITHUB_WORKSPACE/$GEN_FILE" \
            --storage "$STORAGE_PATH" \
            --gpu none \
            --release "$REL" \
            --modules "${{ github.event.inputs.modules || 'jarvis-whisper-api,jarvis-tts,jarvis-notifications,jarvis-web,jarvis-admin,jarvis-phone-gateway' }}"

      - name: Validate generated compose
        run: docker compose -f "$GEN_FILE" -f "$OVERRIDE_FILE" config -q && echo "compose valid"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Phase 0 — matrix validity + image existence
        # No GPU/runtime needed: generates every gpu × track × module-set combo,
        # asserts `docker compose config` + invariants, and verifies every ghcr
        # image tag actually exists (catches the breadth the CPU runtime can't).
        run: python3 install-e2e/validate_matrix.py
        env:
          INSTALLER_DIR: jarvis-installer

      - name: Prepare host storage
        run: sudo mkdir -p "$STORAGE_PATH" && sudo chmod 777 "$STORAGE_PATH"

      - name: Pull images (with retry)
        run: |
          # GHCR pulls of the larger images (~3GB) occasionally i/o-timeout;
          # retry the pull so a transient blip doesn't fail the whole bring-up.
          pull() { docker compose -p "$COMPOSE_PROJECT" "$@" pull; }
          for i in 1 2 3 4; do
            pull -f "$GEN_FILE" -f "$OVERRIDE_FILE" -f "$NODE_FILE" && break
            echo "::warning::image pull attempt $i failed; retrying in 20s"
            sleep 20
          done

      - name: Bring up the core stack
        run: docker compose -p "$COMPOSE_PROJECT" -f "$GEN_FILE" -f "$OVERRIDE_FILE" up -d

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -r install-e2e/requirements.txt

      - name: Phase 1 — deployment validity
        run: pytest install-e2e/test_deployment.py -v --junitxml=phase1-results.xml

      - name: Phase 1.5 — migrations actually ran (KEYSTONE for the 2026-06 incident)
        # The migrate-set services run `alembic upgrade head` on startup, so by
        # now their DBs must be at HEAD. This asserts cur==head IN-CONTAINER for
        # each (catches a service that came up on a stale schema — exactly the
        # config-service migration-005 bug that 500'd /services fleet-wide and
        # which the old /health-only suite missed) AND that /services == 200.
        run: pytest install-e2e/test_migrations.py -v --junitxml=phase1_5-results.xml

      - name: Install admin SYNC generator deps
        # Only the server package is needed (it owns the SYNC compose generator +
        # tsx). Non-fatal if it can't install — the sync-static lane self-skips.
        working-directory: jarvis-admin/server
        run: npm ci || npm install

      - name: "Phase 1.6 — SYNC-path lane (the actual hole: admin reconcile compose)"
        # Regenerate the admin SYNC / reconcile compose via its REAL
        # generateCompose and assert STATICALLY that every migrate-set service
        # block carries the alembic migrate entrypoint (and deferred logs/tts do
        # NOT). The export compose migrated config-service; this proves the
        # sync/reconcile path — where the fleet-outage bug lived — does too.
        #
        # The live sync bring-up (up the sync compose, then re-run the
        # migrations-ran + /services==200 assertions against it) is the heavier
        # follow-on — scaffolded below as the `sync-live` job. This static lane
        # is the always-on guard.
        env:
          ADMIN_SERVER_DIR: ${{ github.workspace }}/jarvis-admin/server
        run: pytest install-e2e/test_sync_compose.py -v --junitxml=phase1_6-results.xml

      - name: Seed (superuser, node, llm.interface)
        run: |
          sudo mkdir -p /var/lib/jarvis/node /var/lib/jarvis/node-data
          sudo chmod -R 777 /var/lib/jarvis/node /var/lib/jarvis/node-data
          python install-e2e/seed.py

      - name: Bring up the node container (Phase 3)
        run: |
          docker compose -p "$COMPOSE_PROJECT" -f "$GEN_FILE" -f "$OVERRIDE_FILE" -f "$NODE_FILE" up -d jarvis-node
          echo "JARVIS_E2E_NODE=1" >> "$GITHUB_ENV"

      - name: Phase 2 + 3 — behavior routing + real node MQTT/K2
        run: pytest install-e2e/test_behavior.py install-e2e/test_node_mqtt_k2.py -v --junitxml=phase23-results.xml

      - name: Phase 4 — idempotency + persistence
        run: pytest install-e2e/test_persistence.py -v --junitxml=phase4-results.xml
        env:
          JARVIS_E2E_COMPOSE_ARGS: "-f ${{ env.GEN_FILE }} -f ${{ env.OVERRIDE_FILE }} -f ${{ env.NODE_FILE }}"
          JARVIS_E2E_PERSISTENCE: "1"

      - name: Diagnostics on failure
        if: failure()
        run: |
          C="docker compose -p $COMPOSE_PROJECT -f $GEN_FILE -f $OVERRIDE_FILE -f $NODE_FILE"
          $C ps || true
          $C logs --tail 150 || true
          docker logs jarvis-node --tail 120 2>&1 || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-results
          path: |
            phase1-results.xml
            phase1_5-results.xml
            phase1_6-results.xml
            phase23-results.xml
            phase4-results.xml
            ${{ env.GEN_FILE }}
            ${{ env.SYNC_FILE }}
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -p "$COMPOSE_PROJECT" -f "$GEN_FILE" -f "$OVERRIDE_FILE" -f "$NODE_FILE" down -v || true

  # ── SYNC-path LIVE lane ──────────────────────────────────────────────────────
  # The actual hole in the 2026-06 incident: the harness only ever stood up the
  # INSTALLER's export compose. The bug lived in the ADMIN SYNC / reconcile
  # compose. The `e2e` job's Phase 1.6 proves the sync compose is GENERATED with
  # the migrate entrypoints (static). THIS job goes the whole way: it brings the
  # sync compose UP on its own project and runs the SAME keystone assertions
  # (migrations-ran cur==head + /services==200) against the live sync stack — so
  # a sync-path service that skipped migrations fails here exactly as it would on
  # a real reconcile.
  #
  # It's a full second bring-up, so it's heavy: gated to the nightly schedule and
  # explicit `sync_live=true` dispatch (not every PR). Uses its own
  # COMPOSE_PROJECT so it never collides with the `e2e` job's stack.
  sync-live:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'schedule' || github.event.inputs.sync_live == 'true'
    env:
      SYNC_PROJECT: jarvis-sync
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout umbrella (harness)
        uses: actions/checkout@v4

      - name: Checkout jarvis-admin (SYNC / reconcile generator)
        uses: actions/checkout@v4
        with:
          repository: alexberardi/jarvis-admin
          path: jarvis-admin

      - name: Free up disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "${AGENT_TOOLSDIRECTORY:-}" || true
          docker system prune -af || true
          df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate the admin SYNC / reconcile bundle (compose + .env + init-db.sh)
        # --bundle emits the standard-mode trio (the sync compose uses ${VAR}
        # refs, so it needs a .env + init-db.sh to come up). The .env lands at
        # install-e2e/.env, next to $SYNC_FILE.
        working-directory: jarvis-admin/server
        run: |
          npm ci || npm install
          npx tsx "$GITHUB_WORKSPACE/install-e2e/gen-sync-compose.mts" \
            --out "$GITHUB_WORKSPACE/$SYNC_FILE" --bundle

      - name: Validate the SYNC compose
        run: docker compose --env-file install-e2e/.env -f "$SYNC_FILE" -f "$OVERRIDE_FILE" config -q && echo "sync compose valid"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare host storage
        run: sudo mkdir -p "$STORAGE_PATH" && sudo chmod 777 "$STORAGE_PATH"

      - name: Pull images (with retry)
        run: |
          C="docker compose --env-file install-e2e/.env -p $SYNC_PROJECT -f $SYNC_FILE -f $OVERRIDE_FILE"
          for i in 1 2 3 4; do
            $C pull && break
            echo "::warning::sync image pull attempt $i failed; retrying in 20s"
            sleep 20
          done

      - name: Bring up the SYNC stack
        run: docker compose --env-file install-e2e/.env -p "$SYNC_PROJECT" -f "$SYNC_FILE" -f "$OVERRIDE_FILE" up -d

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -r install-e2e/requirements.txt

      - name: SYNC live — migrations actually ran + /services==200
        # The keystone assertions, now against the live SYNC stack. The
        # container_names are identical (the generator emits fixed names), so the
        # in-container alembic-at-head + /services checks reuse as-is — a sync-path
        # service that skips migrations fails here exactly as it would on a real
        # reconcile.
        #
        # KNOWN GAP (why this lane is opt-in / best-effort, not on every PR):
        # the standard-mode .env carries PLACEHOLDER per-service app credentials,
        # whereas a real reconcile registers them via config-service
        # /v1/services/register (creating matching creds in jarvis-auth). So
        # app-to-app calls on this live sync stack may 401 — but the migrate
        # entrypoint runs BEFORE auth matters (it only needs the DB), so the
        # migrations-ran assertion is still meaningful. Closing the credential gap
        # (mirror the export stack's seed.py / registerServices) is the follow-on
        # to make this lane fully faithful.
        run: pytest install-e2e/test_migrations.py -v --junitxml=sync-live-results.xml

      - name: Diagnostics on failure
        if: failure()
        run: |
          C="docker compose --env-file install-e2e/.env -p $SYNC_PROJECT -f $SYNC_FILE -f $OVERRIDE_FILE"
          $C ps || true
          $C logs --tail 150 || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-sync-live-results
          path: |
            sync-live-results.xml
            ${{ env.SYNC_FILE }}
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose --env-file install-e2e/.env -p "$SYNC_PROJECT" -f "$SYNC_FILE" -f "$OVERRIDE_FILE" down -v || true
