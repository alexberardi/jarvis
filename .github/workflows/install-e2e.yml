name: install-e2e

# Stands up the EXACT artifact the installer ships (generated compose-export),
# on a clean ubuntu-latest, and asserts the whole install actually works —
# instead of finding out by hand on someone's machine.
#
# Phase 1 (now): generate -> validate -> up -> assert health + admin configured
#                + ports/volumes/networking. Catches the class of bugs that hit
#                the Bazzite box (undefined volume, missing admin port, curl
#                healthcheck on a Node image, admin can't reach auth).
# Phase 2 (next): CC routes a voice-command corpus through the real ChatGPTOpenAI
#                provider -> cloud model (needs OPENAI_API_KEY).
# Phase 3 (next): real jarvis-node container joins Mosquitto + completes K2.
#
# Not on pull_request (needs the OpenAI secret for Phase 2; public-repo hygiene).

on:
  workflow_dispatch:
    inputs:
      modules:
        description: "Recommended modules to enable (comma-separated)"
        default: "jarvis-whisper-api,jarvis-tts,jarvis-notifications,jarvis-web,jarvis-admin"
  schedule:
    - cron: "37 6 * * *" # nightly, after the llm-proxy behavior lane

permissions:
  contents: read
  packages: read

concurrency:
  group: install-e2e
  cancel-in-progress: true

env:
  STORAGE_PATH: /var/lib/jarvis
  COMPOSE_PROJECT: jarvis
  GEN_FILE: install-e2e/docker-compose.gen.yaml
  OVERRIDE_FILE: install-e2e/docker-compose.ci-override.yaml
  NODE_FILE: install-e2e/docker-compose.node.yaml

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout umbrella (harness)
        uses: actions/checkout@v4

      - name: Checkout jarvis-installer (generator)
        uses: actions/checkout@v4
        with:
          repository: alexberardi/jarvis-installer
          path: jarvis-installer

      - name: Free up disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "${AGENT_TOOLSDIRECTORY:-}" || true
          docker system prune -af || true
          df -h /

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: jarvis-installer/package-lock.json

      - name: Generate the real install artifact (compose-export)
        working-directory: jarvis-installer
        run: |
          npm ci
          npx tsx scripts/gen-export-compose.mts \
            --out "$GITHUB_WORKSPACE/$GEN_FILE" \
            --storage "$STORAGE_PATH" \
            --gpu none \
            --modules "${{ github.event.inputs.modules || 'jarvis-whisper-api,jarvis-tts,jarvis-notifications,jarvis-web,jarvis-admin' }}"

      - name: Validate generated compose
        run: docker compose -f "$GEN_FILE" -f "$OVERRIDE_FILE" config -q && echo "compose valid"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare host storage
        run: sudo mkdir -p "$STORAGE_PATH" && sudo chmod 777 "$STORAGE_PATH"

      - name: Pull images (with retry)
        run: |
          # GHCR pulls of the larger images (~3GB) occasionally i/o-timeout;
          # retry the pull so a transient blip doesn't fail the whole bring-up.
          pull() { docker compose -p "$COMPOSE_PROJECT" "$@" pull; }
          for i in 1 2 3 4; do
            pull -f "$GEN_FILE" -f "$OVERRIDE_FILE" -f "$NODE_FILE" && break
            echo "::warning::image pull attempt $i failed; retrying in 20s"
            sleep 20
          done

      - name: Bring up the core stack
        run: docker compose -p "$COMPOSE_PROJECT" -f "$GEN_FILE" -f "$OVERRIDE_FILE" up -d

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -r install-e2e/requirements.txt

      - name: Phase 1 — deployment validity
        run: pytest install-e2e/test_deployment.py -v --junitxml=phase1-results.xml

      - name: Seed (superuser, node, llm.interface)
        run: |
          sudo mkdir -p /var/lib/jarvis/node /var/lib/jarvis/node-data
          sudo chmod -R 777 /var/lib/jarvis/node /var/lib/jarvis/node-data
          python install-e2e/seed.py

      - name: Bring up the node container (Phase 3)
        run: |
          docker compose -p "$COMPOSE_PROJECT" -f "$GEN_FILE" -f "$OVERRIDE_FILE" -f "$NODE_FILE" up -d jarvis-node
          echo "JARVIS_E2E_NODE=1" >> "$GITHUB_ENV"

      - name: Phase 2 + 3 — behavior routing + real node MQTT/K2
        run: pytest install-e2e/test_behavior.py install-e2e/test_node_mqtt_k2.py -v --junitxml=phase23-results.xml

      - name: Diagnostics on failure
        if: failure()
        run: |
          C="docker compose -p $COMPOSE_PROJECT -f $GEN_FILE -f $OVERRIDE_FILE -f $NODE_FILE"
          $C ps || true
          $C logs --tail 150 || true
          docker logs jarvis-node --tail 120 2>&1 || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-e2e-results
          path: |
            phase1-results.xml
            phase23-results.xml
            ${{ env.GEN_FILE }}
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose -p "$COMPOSE_PROJECT" -f "$GEN_FILE" -f "$OVERRIDE_FILE" -f "$NODE_FILE" down -v || true
